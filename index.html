<!doctype html>
<html lang="cs">
    <head>
        <title>Atlas států</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
        />
        
        <style>
            body {
                background-color: #eaf7ff;
            }
            /* Moderní vzhled selectu */
            .custom-select {
                max-width: 300px;
                border: 2px solid #0d6efd;
                border-radius: 50px;
                padding: 10px 20px;
                font-weight: 600;
                color: #0d6efd;
                background-color: rgb(255, 255, 255);
                box-shadow: 0 4px 15px rgba(13, 110, 253, 0.15);
                transition: all 0.3s ease;
            }
            .custom-select:focus {
                border-color: #0a58ca;
                box-shadow: 0 4px 20px rgba(13, 110, 253, 0.3);
                outline: none;
            }
            /* Efekt pro karty států při najetí myší */
            .country-card {
                transition: transform 0.3s ease, box-shadow 0.3s ease;
            }
            .country-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 10px 20px rgba(0,0,0,0.15) !important;
            }
        </style>
    </head>

    <body>
        <header class="bg-dark text-light text-center py-5 shadow-sm" style="background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);">
            <h1 class="fw-bold mb-3">Atlas</h1>
            <div class="d-flex justify-content-center">
                <select id="continent" class="form-select custom-select text-center">
                    <option value="europe">Evropa</option>
                    <option value="asia">Asie</option>
                    <option value="africa">Afrika</option>
                    <option value="americas">Amerika</option>
                    <option value="oceania">Oceánie</option>
                </select>
            </div>
        </header>

        <main class="container-fluid my-5 px-4">
            <div class="row g-4" id="countries-list"></div>
        </main>

        <footer class="bg-dark p-4 text-white-50 text-center border-top border-secondary">
             &copy; 2026 IT2 - Martin Olbrecht
        </footer>

        <div class="modal fade" id="one-country" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow-lg rounded-4">
          
                    <div class="modal-header bg-light border-bottom-0 pt-4 px-4">
                        <h4 class="modal-title fw-bold text-dark">Název státu</h4>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
          
                    <div class="modal-body px-4 pb-4" id="modal-body-content">
                        Načítání informací...
                    </div>
          
                    <div class="modal-footer border-top-0 px-4 pb-4">
                        <button type="button" class="btn btn-secondary rounded-3 px-4" data-bs-dismiss="modal">Zavřít</button>
                    </div>
          
                </div>
            </div>
        </div>
                
        <script
            src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
            integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
            crossorigin="anonymous"
        ></script>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
            integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
            crossorigin="anonymous"
        ></script>
        <script src="atlas.js"></script>
    </body>
</html>
